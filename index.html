<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="POKER.OS">
<meta name="theme-color" content="#02040a">
<title>POKER.OS</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%;
  background:#02040a;
  color:#d0e8ff;
  font-family:'Share Tech Mono',monospace;
  -webkit-text-size-adjust:100%;
  /* NO overflow:hidden qui - causa problemi su mobile */
}

/* SFONDO STELLE */
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* WRAPPER APP - tutto sopra le stelle */
#wrap{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  min-height:100vh;
  min-height:-webkit-fill-available;
}

/* LOADING */
#loading{
  position:fixed;inset:0;z-index:999;background:#02040a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
#loading h1{font-family:'Orbitron',sans-serif;font-size:24px;color:#ffd700;letter-spacing:4px;}
#loading p{font-size:9px;color:#4488aa;letter-spacing:3px;}
.spin{width:30px;height:30px;border:2px solid #002d3d;border-top-color:#ffd700;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#lerr{font-size:10px;color:#ff3355;text-align:center;max-width:290px;line-height:1.9;display:none;padding:0 10px;}
#lbtn{display:none;padding:10px 22px;background:#3a2d00;color:#ffd700;border:1px solid #ffd700;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;}

/* TOPBAR */
#topbar{
  background:#05080f;
  border-bottom:1px solid #002d3d;
  padding:10px 16px 8px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;flex-shrink:0;
}
#topbar::after{content:'';position:absolute;bottom:-1px;left:0;width:88px;height:2px;background:#ffd700;}
#logo{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;color:#ffd700;letter-spacing:2px;}
#logo small{display:block;font-size:7px;color:#4488aa;letter-spacing:2px;margin-top:2px;font-family:'Share Tech Mono',monospace;font-weight:normal;}
#sw{display:flex;align-items:center;gap:5px;}
#sd{width:8px;height:8px;border-radius:50%;background:#002d3d;transition:all 0.3s;}
#sd.on{background:#00ff88;box-shadow:0 0 6px #00ff88;}
#sd.sy{background:#ffd700;animation:blink 0.7s infinite;}
#sd.off{background:#ff3355;}
#st{font-size:8px;color:#4488aa;letter-spacing:1px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* TABS */
#tabs{
  display:flex;background:#05080f;
  border-bottom:1px solid #002d3d;flex-shrink:0;
}
.tab{
  flex:1;padding:10px 2px;text-align:center;font-size:9px;
  letter-spacing:1px;color:#4488aa;cursor:pointer;
  border-bottom:2px solid transparent;user-select:none;
  transition:color .2s,border-color .2s;
}
.tab.on{color:#ffd700;border-bottom-color:#ffd700;}

/* PAGES - semplice show/hide */
.page{display:none;padding:12px 12px 40px;}
.page.on{display:block;}

/* CARD */
.card{
  background:#090e18;border:1px solid #002d3d;
  border-radius:4px;padding:14px;margin-bottom:10px;position:relative;
}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:#ffd700;border-radius:3px 0 0 3px;}
.ct{font-size:9px;letter-spacing:2px;color:#ffd700;margin-bottom:12px;}

/* CLASSIFICA */
.rrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #0d1828;}
.rbg{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;flex-shrink:0;}
.rbg.r1{background:#3a2d00;color:#ffd700;border:1px solid #ffd700;}
.rbg.r2{background:#1a1a20;color:#c0c8d8;border:1px solid #c0c8d8;}
.rbg.r3{background:#1a1005;color:#cd7f32;border:1px solid #cd7f32;}
.rbg.rn{background:#0c1220;color:#4488aa;border:1px solid #002d3d;}
.ri{flex:1;min-width:0;}
.rn2{font-size:13px;color:#d0e8ff;}
.rs{font-size:8px;color:#4488aa;margin-top:2px;}
.rm{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;flex-shrink:0;}
.rm.pos{color:#00ff88;}.rm.neg{color:#ff3355;}.rm.zer{color:#4488aa;}

/* FORM */
.sh{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.sn{width:22px;height:22px;border-radius:50%;background:#3a2d00;color:#ffd700;border:1px solid #ffd700;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.sti{font-size:10px;letter-spacing:2px;color:#ffd700;}
.lbl{display:block;font-size:8px;color:#4488aa;letter-spacing:1.5px;margin-bottom:5px;}
.inp,.sel{
  width:100%;padding:11px 12px;background:#060c16;color:#d0e8ff;
  font-family:'Share Tech Mono',monospace;font-size:14px;
  border:1px solid #002d3d;border-radius:3px;outline:none;-webkit-appearance:none;
}
.inp:focus,.sel:focus{border-color:#ffd700;}
.inp.g{color:#ffd700;}
option{background:#060c16;}

/* player grid */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.pc{display:flex;align-items:center;gap:8px;padding:11px 10px;background:#060c16;border:1px solid #002d3d;border-radius:3px;cursor:pointer;user-select:none;}
.pc.on{border-color:#ffd700;background:#3a2d00;}
.dot{width:9px;height:9px;border-radius:50%;background:#002d3d;flex-shrink:0;transition:background .15s;}
.pc.on .dot{background:#ffd700;}
.pn{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#d0e8ff;}

/* podio */
.psl{padding:10px 12px;background:#060c16;border-radius:3px;margin-bottom:8px;}
.psl.s1{border-left:3px solid #ffd700;}.psl.s2{border-left:3px solid #c0c8d8;}.psl.s3{border-left:3px solid #cd7f32;}
.pll{font-size:9px;color:#4488aa;letter-spacing:1px;margin-bottom:6px;}
.pll.s1{color:#ffd700;}.pll.s2{color:#c0c8d8;}.pll.s3{color:#cd7f32;}
.prow{display:flex;gap:8px;}

/* rientri */
.rpl{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#060c16;border:1px solid #002d3d;border-radius:3px;margin-bottom:6px;}
.rcl{display:flex;align-items:center;gap:12px;}
.cb{width:34px;height:34px;border-radius:50%;background:#0c1220;border:1px solid #002d3d;color:#00e5ff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;line-height:1;}
.cb:active{background:#002d3d;}
.cv{font-family:'Orbitron',sans-serif;font-size:15px;color:#ffd700;min-width:22px;text-align:center;}

/* nav buttons */
.nr{display:flex;gap:8px;margin-top:12px;}
.bs{flex:1;padding:12px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;background:#0c1220;color:#4488aa;border:1px solid #002d3d;border-radius:3px;cursor:pointer;-webkit-appearance:none;}
.bs:active{background:#002d3d;}
.bp{flex:2;padding:12px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;background:#ffd700;color:#02040a;border:none;border-radius:3px;cursor:pointer;-webkit-appearance:none;}
.bp:active{transform:scale(0.97);}
.bd{padding:8px 12px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;background:#280010;color:#ff3355;border:1px solid #440018;border-radius:3px;cursor:pointer;-webkit-appearance:none;}
.ib{display:flex;justify-content:space-between;padding:7px 10px;background:#0c1220;border-radius:3px;font-size:9px;margin-bottom:10px;}
.ib span{color:#4488aa;}.ib strong{color:#ffd700;}

/* storico */
.sc{background:#090e18;border:1px solid #002d3d;border-radius:4px;margin-bottom:10px;overflow:hidden;}
.sh2{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #002d3d;cursor:pointer;background:#0c1220;}
.sdt{font-family:'Orbitron',sans-serif;font-size:10px;color:#ffd700;}
.sm{font-size:8px;color:#4488aa;margin-top:2px;}
.sb{padding:12px 14px;display:none;}
.sb.on{display:block;}
.pmini{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.med{display:flex;align-items:center;gap:5px;padding:5px 8px;background:#060c16;border-radius:3px;font-size:10px;}
.med.m1{border-left:2px solid #ffd700;color:#ffd700;}
.med.m2{border-left:2px solid #c0c8d8;color:#c0c8d8;}
.med.m3{border-left:2px solid #cd7f32;color:#cd7f32;}
.pt{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.ptg{padding:3px 8px;background:#0c1220;border:1px solid #002d3d;border-radius:2px;font-size:9px;color:#4488aa;}
.pzr{display:flex;justify-content:space-between;font-size:10px;padding:4px 0;border-bottom:1px solid #0d1828;}

/* giocatori */
.psc{background:#090e18;border:1px solid #002d3d;border-radius:4px;padding:14px;margin-bottom:10px;}
.psh{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.pav{width:40px;height:40px;border-radius:50%;background:#3a2d00;border:1px solid #ffd700;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:14px;color:#ffd700;flex-shrink:0;}
.psg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pss{background:#060c16;border-radius:3px;padding:8px;text-align:center;}
.psv{font-family:'Orbitron',sans-serif;font-size:13px;color:#00e5ff;}
.psl2{font-size:7px;color:#4488aa;letter-spacing:1px;margin-top:3px;}
.mpl{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#060c16;border:1px solid #002d3d;border-radius:3px;margin-bottom:6px;}
.mpl span{font-size:12px;color:#d0e8ff;}
.md{background:none;border:1px solid #002d3d;color:#4488aa;font-size:9px;cursor:pointer;padding:5px 8px;border-radius:2px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;-webkit-appearance:none;}
.md:active{border-color:#ff3355;color:#ff3355;}
.ar{display:flex;gap:8px;margin-top:8px;}
.ar input{flex:1;padding:10px 12px;background:#060c16;color:#d0e8ff;font-family:'Share Tech Mono',monospace;font-size:13px;border:1px solid #002d3d;border-radius:3px;outline:none;-webkit-appearance:none;}
.ar input:focus{border-color:#ffd700;}
.ar button{padding:10px 14px;background:#3a2d00;color:#ffd700;border:1px solid #ffd700;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;-webkit-appearance:none;white-space:nowrap;}

/* PIN modal */
#pm{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:990;display:none;align-items:center;justify-content:center;}
#pm.on{display:flex;}
#pb{background:#090e18;border:1px solid #ffd700;border-radius:6px;padding:26px 22px;width:270px;max-width:90vw;text-align:center;}
.pt2{font-family:'Orbitron',sans-serif;font-size:11px;color:#ffd700;letter-spacing:3px;margin-bottom:4px;}
.ps2{font-size:9px;color:#4488aa;margin-bottom:16px;letter-spacing:1px;}
#pf{width:100%;padding:12px;background:#060c16;color:#ffd700;font-family:'Orbitron',sans-serif;font-size:22px;letter-spacing:8px;text-align:center;border:1px solid #002d3d;border-radius:3px;outline:none;-webkit-appearance:none;margin-bottom:10px;}
#pf:focus{border-color:#ffd700;}
#pe{font-size:10px;color:#ff3355;min-height:16px;margin-bottom:10px;}
.pb2{display:flex;gap:8px;}
.pno{flex:1;padding:11px;background:#0c1220;color:#4488aa;border:1px solid #002d3d;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;-webkit-appearance:none;}
.pok{flex:2;padding:11px;background:#ffd700;color:#02040a;border:none;border-radius:3px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;-webkit-appearance:none;}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ffd700;color:#02040a;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;padding:10px 22px;border-radius:3px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;white-space:nowrap;}
#toast.on{opacity:1;}
#toast.err{background:#ff3355;color:#fff;}

/* STATO VUOTO - colore visibile! */
.empty{text-align:center;padding:36px 16px;color:#6699bb;font-size:11px;letter-spacing:1px;line-height:2.5;}
.empty .ico{font-size:36px;margin-bottom:8px;opacity:0.5;}

::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-thumb{background:#002d3d;}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- LOADING -->
<div id="loading">
  <h1>♠ POKER.OS</h1>
  <p id="lsub">CONNESSIONE AL DATABASE...</p>
  <div class="spin" id="lsp"></div>
  <div id="lerr"></div>
  <button id="lbtn" onclick="location.reload()">↺ RIPROVA</button>
</div>

<!-- PIN MODAL -->
<div id="pm">
  <div id="pb">
    <div class="pt2">♠ AREA ADMIN</div>
    <div class="ps2">INSERISCI IL PIN SEGRETO</div>
    <input id="pf" type="password" inputmode="numeric" maxlength="6" placeholder="••••"
           onkeydown="if(event.key==='Enter')pchk()">
    <div id="pe"></div>
    <div class="pb2">
      <button class="pno" onclick="pcls()">ANNULLA</button>
      <button class="pok" onclick="pchk()">◈ OK</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="wrap">

  <!-- TOPBAR -->
  <div id="topbar">
    <div id="logo">♠ POKER.OS <small>◈ TRACKER SETTIMANALE</small></div>
    <div id="sw">
      <div id="sd"></div>
      <span id="st" style="font-size:8px;color:#4488aa;margin-left:5px;letter-spacing:1px;">—</span>
    </div>
  </div>

  <!-- TABS -->
  <div id="tabs">
    <div class="tab on"  onclick="GT('rank',this)">🏆 RANK</div>
    <div class="tab"     onclick="GT('new',this)">➕ PARTITA</div>
    <div class="tab"     onclick="GT('hist',this)">📋 STORICO</div>
    <div class="tab"     onclick="GT('plr',this)">👤 GIOC.</div>
  </div>

  <!-- CLASSIFICA -->
  <div class="page on" id="pg-rank">
    <div class="card" style="padding:0;overflow:hidden;">
      <div style="padding:12px 14px 6px;"><div class="ct">◈ CLASSIFICA GENERALE</div></div>
      <div id="rl"></div>
    </div>
  </div>

  <!-- NUOVA PARTITA -->
  <div class="page" id="pg-new">
    <div id="fa"></div>
  </div>

  <!-- STORICO -->
  <div class="page" id="pg-hist">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="font-size:9px;color:#4488aa;letter-spacing:2px;">◈ PARTITE REGISTRATE</span>
      <button class="bd" onclick="adm('rst')">⌫ RESET</button>
    </div>
    <div id="hl"></div>
  </div>

  <!-- GIOCATORI -->
  <div class="page" id="pg-plr">
    <div class="card">
      <div class="ct">◈ GESTIONE GIOCATORI</div>
      <div id="ml"></div>
      <div class="ar">
        <input id="ni" type="text" placeholder="Nome giocatore..." maxlength="18"
               onkeydown="if(event.key==='Enter')addP()">
        <button onclick="addP()">+ AGGIUNGI</button>
      </div>
    </div>
    <div id="sl"></div>
  </div>

</div><!-- /wrap -->

<div id="toast"></div>

<script>
'use strict';

/* ═══ CONFIG ═══ */
const FBC = {
  apiKey:"AIzaSyCj7OZPO0H5MJR-ac6S2hLRzQhezu6_hqA",
  authDomain:"poker-os-f0789.firebaseapp.com",
  databaseURL:"https://poker-os-f0789-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"poker-os-f0789",
  storageBucket:"poker-os-f0789.firebasestorage.app",
  messagingSenderId:"1031295699512",
  appId:"1:1031295699512:web:e391ff5b5c7c3dec4d74cd"
};
const APIN  = "1234";  // ← CAMBIA IL TUO PIN SEGRETO QUI
const BUYIN = 10;

/* ═══ STATO ═══ */
let db = null;
let D  = { players:[], sessions:[] };
let pinCb = null;
const F = { step:1, date:'', players:[], re:{}, pod:['','',''], prz:['','',''] };

/* ═══ LOADING ═══ */
function hideLoad(){
  document.getElementById('loading').style.display='none';
}
function showErr(msg){
  document.getElementById('lsp').style.display='none';
  const e=document.getElementById('lerr'); e.style.display='block'; e.innerHTML=msg.replace(/\n/g,'<br>');
  document.getElementById('lbtn').style.display='block';
}
function setSy(s){
  document.getElementById('sd').className=s;
  document.getElementById('st').textContent=s==='on'?'ONLINE':s==='sy'?'SYNC...':'OFFLINE';
}

/* ═══ FIREBASE ═══ */
try {
  firebase.initializeApp(FBC);
  db = firebase.database();
  const tid = setTimeout(()=>showErr('Connessione assente.\nControlla internet e riprova.'), 12000);
  db.ref('pokeros').on('value', snap=>{
    clearTimeout(tid);
    const v = snap.val();
    D.players  = (v&&Array.isArray(v.players))  ? v.players  : [];
    D.sessions = (v&&Array.isArray(v.sessions)) ? v.sessions : [];
    hideLoad(); setSy('on');
    renderAll();
    if(document.getElementById('pg-new').classList.contains('on')) buildF();
  }, e=>{ clearTimeout(tid); showErr('Errore:\n'+e.message); });
  firebase.database().ref('.info/connected').on('value',s=>{
    if(document.getElementById('loading').style.display==='none') setSy(s.val()?'on':'off');
  });
} catch(e){ showErr('Errore Firebase:\n'+e.message); }

function save(){
  if(!db) return; setSy('sy');
  db.ref('pokeros').set({players:D.players,sessions:D.sessions})
    .then(()=>setSy('on'))
    .catch(()=>{setSy('off');T('ERRORE SALVATAGGIO',1);});
}

/* ═══ TABS ═══ */
function GT(id, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('pg-'+id).classList.add('on');
  window.scrollTo(0,0);
  if(id==='new') buildF(); else renderAll();
}

/* ═══ PIN ═══ */
function adm(a,p){
  pinCb=()=>{
    if(a==='rm') { D.players=D.players.filter(x=>x!==p); save(); renderAll(); T('RIMOSSO'); }
    if(a==='rst'){ if(confirm('Eliminare TUTTE le partite?')){ D.sessions=[]; save(); renderAll(); T('RESET OK'); } }
    if(a==='del'){ D.sessions.splice(p,1); save(); renderAll(); }
  };
  document.getElementById('pf').value='';
  document.getElementById('pe').textContent='';
  document.getElementById('pm').classList.add('on');
  setTimeout(()=>document.getElementById('pf').focus(),150);
}
function pcls(){ document.getElementById('pm').classList.remove('on'); pinCb=null; }
function pchk(){
  if(document.getElementById('pf').value===APIN){
    pcls(); if(pinCb){pinCb();pinCb=null;}
  } else {
    document.getElementById('pe').textContent='⚠ PIN ERRATO';
    document.getElementById('pf').value='';
    setTimeout(()=>document.getElementById('pe').textContent='',2000);
  }
}

/* ═══ STATS ═══ */
function pSt(n){
  let w=0,p2=0,p3=0,earn=0,sp=0,re=0,sess=0;
  D.sessions.forEach(s=>{
    if(!(s.players||[]).includes(n)) return;
    sess++; sp+=(1+(s.reentries[n]||0))*BUYIN; re+=s.reentries[n]||0;
    const pod=s.podium||[];
    if(pod[0]===n){w++;earn+=Number(s.prizes&&s.prizes[0]||0);}
    else if(pod[1]===n){p2++;earn+=Number(s.prizes&&s.prizes[1]||0);}
    else if(pod[2]===n){p3++;earn+=Number(s.prizes&&s.prizes[2]||0);}
  });
  return{w,p2,p3,earn,sp,net:earn-sp,re,sess};
}
function ranked(){
  const set=new Set(D.players);
  D.sessions.forEach(s=>(s.players||[]).forEach(p=>set.add(p)));
  return[...set].map(n=>({n,...pSt(n)})).sort((a,b)=>b.net-a.net||b.w-a.w);
}
function ptit(s){ return s.w>=5?'♠ SHARK':s.w>=3?'♦ PRO':s.w>=1?'♣ VINCITORE':s.sess>=3?'♥ VETERANO':'◈ ROOKIE'; }

/* ═══ RENDER RANK ═══ */
function rRank(){
  const el=document.getElementById('rl'), r=ranked();
  if(!r.length){ el.innerHTML=`<div class="empty"><div class="ico">♠</div>NESSUN GIOCATORE<br><span style="color:#aabbcc;">Vai su "👤 GIOC." per aggiungerne</span></div>`; return; }
  el.innerHTML=r.map((p,i)=>{
    const bc=['r1','r2','r3'][i]||'rn';
    const ic=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
    const cl=p.net>0?'pos':p.net<0?'neg':'zer';
    return`<div class="rrow">
      <div class="rbg ${bc}">${ic}</div>
      <div class="ri"><div class="rn2">${X(p.n)}</div>
        <div class="rs">${p.w}🥇 ${p.p2}🥈 ${p.p3}🥉 · ${p.sess} partite · ${p.re} rientri</div></div>
      <div class="rm ${cl}">${p.net>0?'+':''}€${Math.abs(p.net)}</div>
    </div>`;
  }).join('');
}

/* ═══ RENDER STORICO ═══ */
function rHist(){
  const el=document.getElementById('hl');
  if(!D.sessions.length){ el.innerHTML=`<div class="empty"><div class="ico">📋</div>NESSUNA PARTITA REGISTRATA</div>`; return; }
  el.innerHTML=[...D.sessions].reverse().map((s,ri)=>{
    const i=D.sessions.length-1-ri;
    const pot=s.players.length*BUYIN+Object.values(s.reentries||{}).reduce((a,b)=>a+b,0)*BUYIN;
    const tr=Object.values(s.reentries||{}).reduce((a,b)=>a+b,0);
    const rs=Object.entries(s.reentries||{}).filter(([,v])=>v>0).map(([n,v])=>`${n}×${v}`).join(' · ')||'—';
    const ic=['🥇','🥈','🥉'];
    const pH=(s.podium||[]).filter(Boolean).map((nm,pi)=>
      `<div class="med m${pi+1}">${ic[pi]} ${X(nm)}${s.prizes&&s.prizes[pi]?' · €'+s.prizes[pi]:''}</div>`).join('');
    const pzH=(s.podium||[]).filter(Boolean).map((nm,pi)=>
      s.prizes&&s.prizes[pi]?`<div class="pzr"><span style="color:#4488aa">${pi+1}°</span><span style="color:#d0e8ff">${X(nm)}</span><span style="color:#00ff88;font-family:'Orbitron',sans-serif;font-size:10px;">€${s.prizes[pi]}</span></div>`:''
    ).join('');
    return`<div class="sc">
      <div class="sh2" onclick="togS(${i})">
        <div><div class="sdt">${X(s.date)}</div><div class="sm">${s.players.length} giocatori · pot €${pot} · rientri: ${tr}</div></div>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="bd" style="padding:4px 8px;font-size:8px;" onclick="event.stopPropagation();adm('del',${i})">✕</button>
          <span id="tog${i}" style="color:#4488aa;">▼</span>
        </div>
      </div>
      <div class="sb" id="sb${i}">
        <div class="pmini">${pH}</div>
        ${pzH?`<div style="margin-bottom:8px;">${pzH}</div>`:''}
        <div style="font-size:8px;color:#4488aa;margin-bottom:4px;">PARTECIPANTI</div>
        <div class="pt">${(s.players||[]).map(p=>`<div class="ptg">${X(p)}</div>`).join('')}</div>
        ${rs!=='—'?`<div style="font-size:9px;color:#cc44ff;margin-top:4px;">🔄 ${rs}</div>`:''}
      </div>
    </div>`;
  }).join('');
}
function togS(i){
  const b=document.getElementById('sb'+i),t=document.getElementById('tog'+i);
  const o=b.classList.toggle('on'); t.textContent=o?'▲':'▼';
}

/* ═══ RENDER GIOCATORI ═══ */
function rPlr(){
  document.getElementById('ml').innerHTML=D.players.length
    ? D.players.map(p=>`<div class="mpl"><span>${X(p)}</span><button class="md" onclick="adm('rm',${JSON.stringify(p)})">🔒 RIMUOVI</button></div>`).join('')
    : `<div style="font-size:10px;color:#6699bb;padding:8px 0 12px;">Nessun giocatore — aggiungine uno!</div>`;
  document.getElementById('sl').innerHTML=ranked().map(p=>{
    const sg=p.net>=0?'+':'';
    return`<div class="psc">
      <div class="psh">
        <div class="pav">${p.n.substring(0,2).toUpperCase()}</div>
        <div><div style="font-size:14px;color:#d0e8ff;">${X(p.n)}</div>
          <div style="font-size:8px;color:#ffd700;letter-spacing:1px;margin-top:2px;">${ptit(p)}</div></div>
        <div style="margin-left:auto;text-align:right;">
          <div style="font-family:'Orbitron',sans-serif;font-size:14px;color:${p.net>=0?'#00ff88':'#ff3355'};">${sg}€${Math.abs(p.net)}</div>
          <div style="font-size:8px;color:#4488aa;">NETTO</div>
        </div>
      </div>
      <div class="psg">
        <div class="pss"><div class="psv" style="color:#ffd700;">${p.w}</div><div class="psl2">VITTORIE</div></div>
        <div class="pss"><div class="psv" style="color:#c0c8d8;">${p.p2}</div><div class="psl2">2° POSTO</div></div>
        <div class="pss"><div class="psv" style="color:#cd7f32;">${p.p3}</div><div class="psl2">3° POSTO</div></div>
        <div class="pss"><div class="psv">${p.sess}</div><div class="psl2">PARTITE</div></div>
        <div class="pss"><div class="psv" style="color:#cc44ff;">${p.re}</div><div class="psl2">RIENTRI</div></div>
        <div class="pss"><div class="psv" style="color:#ff3355;">€${p.sp}</div><div class="psl2">SPESO</div></div>
      </div>
    </div>`;
  }).join('');
}

function addP(){
  const inp=document.getElementById('ni'), nm=inp.value.trim();
  if(!nm){T('INSERISCI UN NOME',1);return;}
  if(D.players.includes(nm)){T('GIÀ PRESENTE',1);return;}
  if(D.players.length>=9){T('MASSIMO 9',1);return;}
  D.players.push(nm); inp.value=''; save(); renderAll();
  T('◈ '+nm.toUpperCase()+' AGGIUNTO');
}

/* ═══ RENDER ALL ═══ */
function renderAll(){ rRank(); rHist(); rPlr(); }

/* ═══ FORM ═══ */
function initF(){
  F.step=1; F.date=new Date().toLocaleDateString('it-IT');
  F.players=[]; F.re={}; F.pod=['','','']; F.prz=['','',''];
}

function buildF(){
  const el=document.getElementById('fa'); if(!el) return;

  if(F.step===1){
    const chks=D.players.map(p=>{
      const on=F.players.includes(p);
      return`<div class="pc ${on?'on':''}" onclick="togP(this,${JSON.stringify(p)})"><div class="dot"></div><div class="pn">${X(p)}</div></div>`;
    }).join('');
    el.innerHTML=`<div class="card">
      <div class="sh"><div class="sn">1</div><div class="sti">DATA E GIOCATORI</div></div>
      <label class="lbl">DATA PARTITA</label>
      <input class="inp" id="fd" type="text" value="${F.date}" placeholder="gg/mm/aaaa" oninput="F.date=this.value" style="margin-bottom:14px;">
      <label class="lbl">GIOCATORI <span id="pcnt" style="color:#ffd700;">(${F.players.length} selezionati)</span></label>
      ${D.players.length
        ?`<div class="pgrid">${chks}</div>`
        :`<div style="font-size:10px;color:#ff3355;padding:12px 0;">⚠ Aggiungi prima i giocatori nella tab "👤 GIOC."</div>`}
      <div class="nr"><button class="bp" onclick="s1()">AVANTI ▶</button></div>
    </div>`;

  } else if(F.step===2){
    const tr=Object.values(F.re).reduce((a,b)=>a+b,0);
    el.innerHTML=`<div class="card">
      <div class="sh"><div class="sn">2</div><div class="sti">RIENTRI</div></div>
      <div class="ib"><span>GIOCATORI: <strong>${F.players.length}</strong></span><span>POT: <strong id="pv">€${F.players.length*BUYIN+tr*BUYIN}</strong></span></div>
      ${F.players.map(p=>`<div class="rpl">
        <div style="font-size:12px;color:#d0e8ff;">${X(p)}</div>
        <div class="rcl">
          <button class="cb" onclick="chR(${JSON.stringify(p)},-1)">−</button>
          <div class="cv" id="rv${p.replace(/\W/g,'_')}">${F.re[p]||0}</div>
          <button class="cb" onclick="chR(${JSON.stringify(p)},1)">+</button>
        </div>
      </div>`).join('')}
      <div class="nr">
        <button class="bs" onclick="F.step=1;buildF()">◀ INDIETRO</button>
        <button class="bp" onclick="F.step=3;buildF()">AVANTI ▶</button>
      </div>
    </div>`;

  } else if(F.step===3){
    const mk=idx=>{
      const lb=['🥇 1° POSTO','🥈 2° POSTO','🥉 3° POSTO'][idx];
      const sc=['s1','s2','s3'][idx];
      const op=['<option value="">— seleziona —</option>',
        ...F.players.map(p=>`<option value="${X(p)}"${F.pod[idx]===p?' selected':''}>${X(p)}</option>`)].join('');
      return`<div class="psl ${sc}">
        <div class="pll ${sc}">${lb}</div>
        <div class="prow">
          <select class="sel" style="flex:1" onchange="F.pod[${idx}]=this.value">${op}</select>
          <input class="inp g" type="number" inputmode="decimal" placeholder="€ vincita" min="0" step="0.01"
            style="width:110px;flex-shrink:0;" value="${F.prz[idx]||''}"
            oninput="F.prz[${idx}]=this.value?parseFloat(this.value):''">
        </div>
      </div>`;
    };
    el.innerHTML=`<div class="card">
      <div class="sh"><div class="sn">3</div><div class="sti">PODIO E PREMI</div></div>
      <div style="font-size:9px;color:#4488aa;margin-bottom:12px;">La vincita € è opzionale.</div>
      ${mk(0)}${mk(1)}${F.players.length>=3?mk(2):''}
      <div class="nr">
        <button class="bs" onclick="F.step=2;buildF()">◀ INDIETRO</button>
        <button class="bp" onclick="s3()">AVANTI ▶</button>
      </div>
    </div>`;

  } else if(F.step===4){
    const pot=F.players.length*BUYIN+Object.values(F.re).reduce((a,b)=>a+b,0)*BUYIN;
    const tr=Object.values(F.re).reduce((a,b)=>a+b,0);
    const rs=Object.entries(F.re).filter(([,v])=>v>0).map(([n,v])=>`${n} ×${v}`).join(', ')||'Nessuno';
    const pl=['🥇 1°','🥈 2°','🥉 3°'];
    const ph=F.pod.filter(Boolean).map((nm,i)=>
      `<div class="pzr"><span style="color:#4488aa">${pl[i]}</span><span style="color:#d0e8ff">${X(nm)}</span><span style="color:#00ff88;font-family:'Orbitron',sans-serif;font-size:10px;">${F.prz[i]?'€'+F.prz[i]:''}</span></div>`
    ).join('');
    el.innerHTML=`<div class="card">
      <div class="sh"><div class="sn">4</div><div class="sti">RIEPILOGO</div></div>
      <div class="ib" style="margin-bottom:12px;"><span>📅 <strong>${F.date}</strong></span><span>👥 <strong>${F.players.length}</strong></span><span>💰 <strong>€${pot}</strong></span></div>
      <div style="font-size:9px;color:#4488aa;margin-bottom:6px;">PARTECIPANTI</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;">
        ${F.players.map(p=>`<div class="ptg" style="color:#d0e8ff;">${X(p)}</div>`).join('')}
      </div>
      <div style="font-size:9px;color:#4488aa;margin-bottom:4px;">RIENTRI (${tr})</div>
      <div style="font-size:11px;color:#cc44ff;margin-bottom:12px;">🔄 ${rs}</div>
      <div style="font-size:9px;color:#4488aa;margin-bottom:6px;">PODIO</div>
      <div style="margin-bottom:14px;">${ph}</div>
      <div class="nr">
        <button class="bs" onclick="F.step=3;buildF()">◀ MODIFICA</button>
        <button class="bp" onclick="savS()">♠ SALVA PARTITA</button>
      </div>
    </div>`;
  }
}

function togP(el,nm){
  const i=F.players.indexOf(nm);
  if(i>=0){ F.players.splice(i,1); delete F.re[nm]; el.classList.remove('on'); el.querySelector('.dot').style.background='#002d3d'; }
  else { if(F.players.length>=9){T('MASSIMO 9',1);return;} F.players.push(nm); F.re[nm]=0; el.classList.add('on'); el.querySelector('.dot').style.background='#ffd700'; }
  const c=document.getElementById('pcnt'); if(c) c.textContent=`(${F.players.length} selezionati)`;
}
function s1(){ const fd=document.getElementById('fd'); if(fd) F.date=fd.value.trim()||F.date; if(F.players.length<2){T('SELEZIONA ALMENO 2 GIOCATORI',1);return;} F.step=2; buildF(); }
function chR(nm,d){ F.re[nm]=Math.max(0,(F.re[nm]||0)+d); const e=document.getElementById('rv'+nm.replace(/\W/g,'_')); if(e) e.textContent=F.re[nm]; const tr=Object.values(F.re).reduce((a,b)=>a+b,0); const pv=document.getElementById('pv'); if(pv) pv.textContent='€'+(F.players.length*BUYIN+tr*BUYIN); }
function s3(){ if(!F.pod[0]){T('SELEZIONA IL 1° POSTO',1);return;} F.step=4; buildF(); }
function savS(){
  D.sessions.push({date:F.date,players:[...F.players],reentries:{...F.re},podium:F.pod.map(v=>v||null),prizes:F.prz.map(v=>v||null)});
  save(); T('♠ PARTITA SALVATA!'); initF();
  GT('rank',document.querySelector('.tab'));
}

/* ═══ UTILS ═══ */
function X(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function T(msg,err){
  const t=document.getElementById('toast'); t.textContent=msg; t.className=err?'err on':'on';
  setTimeout(()=>t.classList.remove('on'),2200);
}

/* ═══ STELLE ═══ */
(()=>{
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  const st=Array.from({length:60},()=>({x:Math.random()*9999,y:Math.random()*9999,r:Math.random()*1.3+0.3,ph:Math.random()*6.28,sp:Math.random()*0.015+0.005}));
  function res(){c.width=innerWidth;c.height=innerHeight;} res(); window.addEventListener('resize',res);
  (function dr(){ctx.clearRect(0,0,c.width,c.height);st.forEach(s=>{s.ph+=s.sp;const a=0.1+0.7*(0.5+0.5*Math.sin(s.ph));ctx.beginPath();ctx.arc(s.x%c.width,s.y%c.height,s.r,0,6.28);ctx.fillStyle=`rgba(${Math.round(a*120)},${Math.round(a*190)},255,${a})`;ctx.fill();});requestAnimationFrame(dr);})();
})();

initF();
</script>
</body>
</html>
