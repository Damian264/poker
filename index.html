<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="POKER.OS">
<meta name="theme-color" content="#02040a">
<title>POKER.OS</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #02040a;
  color: #d0e8ff;
  font-family: 'Share Tech Mono', monospace;
  font-size: 15px;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
}
#bg-canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
#app { position: relative; z-index:1; display:flex; flex-direction:column; min-height:100vh; }

/* LOADING */
#loading {
  position:fixed; inset:0; z-index:999; background:#02040a;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
#loading h1 { font-family:'Orbitron',sans-serif; font-size:28px; color:#ffd700; letter-spacing:4px; }
#load-sub   { font-size:11px; color:#4488aa; letter-spacing:3px; }
.spinner { width:32px; height:32px; border:2px solid #002d3d; border-top-color:#ffd700; border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#load-err   { font-size:12px; color:#ff3355; text-align:center; max-width:300px; line-height:1.9; display:none; padding:0 10px; }
#load-retry { display:none; padding:12px 24px; background:#3a2d00; color:#ffd700; border:1px solid #ffd700; border-radius:4px; font-family:'Share Tech Mono',monospace; font-size:13px; cursor:pointer; }

/* TOPBAR */
#topbar {
  flex-shrink:0; background:#05080f; border-bottom:1px solid #002d3d;
  padding:12px 18px 10px; display:flex; align-items:center; justify-content:space-between; position:relative;
}
#topbar::after { content:''; position:absolute; bottom:-1px; left:0; width:88px; height:2px; background:#ffd700; }
#logo { font-family:'Orbitron',sans-serif; font-size:17px; font-weight:900; color:#ffd700; letter-spacing:2px; }
#logo small { display:block; font-size:9px; color:#4488aa; letter-spacing:2px; margin-top:2px; font-family:'Share Tech Mono',monospace; font-weight:normal; }
#sync-wrap { display:flex; align-items:center; gap:6px; }
#sync-dot  { width:9px; height:9px; border-radius:50%; background:#002d3d; transition:all .3s; }
#sync-dot.online  { background:#00ff88; box-shadow:0 0 6px #00ff88; }
#sync-dot.syncing { background:#ffd700; animation:blink .7s infinite; }
#sync-dot.offline { background:#ff3355; }
#sync-text { font-size:10px; color:#4488aa; letter-spacing:1px; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* TABS */
#tabs { flex-shrink:0; display:flex; background:#05080f; border-bottom:1px solid #002d3d; }
.tab {
  flex:1; padding:12px 2px; text-align:center; font-size:11px; letter-spacing:1px;
  color:#4488aa; cursor:pointer; border-bottom:2px solid transparent;
  user-select:none; -webkit-user-select:none; transition:color .2s, border-color .2s;
}
.tab.active { color:#ffd700; border-bottom-color:#ffd700; }

/* PAGES */
.page { display:none; padding:14px 14px 60px; }
.page.active { display:block; }

/* CARD */
.card { background:#090e18; border:1px solid #002d3d; border-radius:6px; padding:16px; margin-bottom:12px; position:relative; }
.card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:#ffd700; border-radius:3px 0 0 3px; }
.card-title { font-size:11px; letter-spacing:2px; color:#ffd700; margin-bottom:14px; }

/* RANK */
.rank-row { display:flex; align-items:center; gap:12px; padding:12px 14px; border-bottom:1px solid #0d1828; }
.rank-badge { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Orbitron',sans-serif; font-size:12px; font-weight:700; flex-shrink:0; }
.rank-badge.r1 { background:#3a2d00; color:#ffd700; border:1px solid #ffd700; }
.rank-badge.r2 { background:#1a1a20; color:#c0c8d8; border:1px solid #c0c8d8; }
.rank-badge.r3 { background:#1a1005; color:#cd7f32; border:1px solid #cd7f32; }
.rank-badge.rn { background:#0c1220; color:#4488aa; border:1px solid #002d3d; }
.rank-info  { flex:1; min-width:0; }
.rank-name  { font-size:15px; color:#d0e8ff; }
.rank-sub   { font-size:10px; color:#4488aa; margin-top:3px; }
.rank-money { font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700; flex-shrink:0; }
.rank-money.pos  { color:#00ff88; }
.rank-money.neg  { color:#ff3355; }
.rank-money.zero { color:#4488aa; }

/* FORM */
.step-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.step-num  { width:26px; height:26px; border-radius:50%; background:#3a2d00; color:#ffd700; border:1px solid #ffd700; display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; }
.step-title { font-size:12px; letter-spacing:2px; color:#ffd700; }
label.field-label { display:block; font-size:10px; color:#4488aa; letter-spacing:1.5px; margin-bottom:6px; }
.field-input, .field-select {
  width:100%; padding:13px 14px; background:#060c16; color:#d0e8ff;
  font-family:'Share Tech Mono',monospace; font-size:15px;
  border:1px solid #002d3d; border-radius:4px; outline:none; -webkit-appearance:none; appearance:none;
}
.field-input:focus, .field-select:focus { border-color:#ffd700; }
.field-input.gold { color:#ffd700; }
option { background:#060c16; }

/* Quota badge — mostrato nell'infobar durante i rientri */
.quota-badge {
  display:inline-block; padding:3px 8px;
  background:#3a2d00; color:#ffd700;
  border:1px solid #ffd700; border-radius:3px;
  font-size:11px; font-family:'Orbitron',sans-serif;
}

/* Player grid */
.player-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.player-card {
  display:flex; align-items:center; gap:10px; padding:14px 12px;
  background:#060c16; border:2px solid #002d3d; border-radius:5px;
  cursor:pointer; user-select:none; -webkit-user-select:none;
  transition:background .15s, border-color .15s; min-height:52px;
}
.player-card.selected { border-color:#ffd700; background:#3a2d00; }
.player-dot { width:11px; height:11px; border-radius:50%; background:#002d3d; flex-shrink:0; transition:background .15s; }
.player-card.selected .player-dot { background:#ffd700; }
.player-card-name { font-size:13px; color:#d0e8ff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* Podio */
.podium-slot { padding:12px 14px; background:#060c16; border-radius:4px; margin-bottom:10px; }
.podium-slot.p1 { border-left:3px solid #ffd700; }
.podium-slot.p2 { border-left:3px solid #c0c8d8; }
.podium-slot.p3 { border-left:3px solid #cd7f32; }
.podium-label { font-size:11px; color:#4488aa; letter-spacing:1px; margin-bottom:8px; }
.podium-label.p1 { color:#ffd700; } .podium-label.p2 { color:#c0c8d8; } .podium-label.p3 { color:#cd7f32; }
.podium-row { display:flex; gap:10px; }

/* Rientri */
.re-player { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:#060c16; border:1px solid #002d3d; border-radius:4px; margin-bottom:8px; }
.re-player-name { font-size:14px; color:#d0e8ff; }
.re-controls { display:flex; align-items:center; gap:14px; }
.count-btn { width:38px; height:38px; border-radius:50%; background:#0c1220; border:1px solid #002d3d; color:#00e5ff; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-appearance:none; line-height:1; flex-shrink:0; }
.count-btn:active { background:#002d3d; }
.count-val { font-family:'Orbitron',sans-serif; font-size:17px; color:#ffd700; min-width:24px; text-align:center; }

/* Bottoni */
.nav-row { display:flex; gap:10px; margin-top:14px; }
.btn-secondary { flex:1; padding:14px; font-family:'Share Tech Mono',monospace; font-size:13px; letter-spacing:1px; background:#0c1220; color:#4488aa; border:1px solid #002d3d; border-radius:4px; cursor:pointer; -webkit-appearance:none; }
.btn-secondary:active { background:#002d3d; }
.btn-primary { flex:2; padding:14px; font-family:'Orbitron',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; background:#ffd700; color:#02040a; border:none; border-radius:4px; cursor:pointer; -webkit-appearance:none; }
.btn-primary:active { transform:scale(.97); }
.btn-danger { padding:10px 14px; font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:1px; background:#280010; color:#ff3355; border:1px solid #440018; border-radius:4px; cursor:pointer; -webkit-appearance:none; }
.info-bar { display:flex; justify-content:space-between; padding:9px 12px; background:#0c1220; border-radius:4px; font-size:11px; margin-bottom:12px; }
.info-bar span { color:#4488aa; } .info-bar strong { color:#ffd700; }

/* Storico */
.session-card { background:#090e18; border:1px solid #002d3d; border-radius:6px; margin-bottom:12px; overflow:hidden; }
.session-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #002d3d; cursor:pointer; background:#0c1220; }
.session-date { font-family:'Orbitron',sans-serif; font-size:12px; color:#ffd700; }
.session-meta { font-size:10px; color:#4488aa; margin-top:3px; }
.session-body { padding:14px 16px; display:none; }
.session-body.open { display:block; }
.medals-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.medal { display:flex; align-items:center; gap:6px; padding:6px 10px; background:#060c16; border-radius:4px; font-size:12px; }
.medal.m1 { border-left:2px solid #ffd700; color:#ffd700; }
.medal.m2 { border-left:2px solid #c0c8d8; color:#c0c8d8; }
.medal.m3 { border-left:2px solid #cd7f32; color:#cd7f32; }
.player-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.player-tag { padding:4px 10px; background:#0c1220; border:1px solid #002d3d; border-radius:3px; font-size:11px; color:#4488aa; }
.prize-row { display:flex; justify-content:space-between; font-size:12px; padding:5px 0; border-bottom:1px solid #0d1828; }

/* Giocatori */
.player-stat-card { background:#090e18; border:1px solid #002d3d; border-radius:6px; padding:16px; margin-bottom:12px; }
.player-stat-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.player-avatar { width:44px; height:44px; border-radius:50%; background:#3a2d00; border:1px solid #ffd700; display:flex; align-items:center; justify-content:center; font-family:'Orbitron',sans-serif; font-size:15px; color:#ffd700; flex-shrink:0; }
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.stat-box { background:#060c16; border-radius:4px; padding:10px; text-align:center; }
.stat-value { font-family:'Orbitron',sans-serif; font-size:15px; color:#00e5ff; }
.stat-label { font-size:9px; color:#4488aa; letter-spacing:1px; margin-top:4px; }
.manage-player-row { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:#060c16; border:1px solid #002d3d; border-radius:4px; margin-bottom:8px; }
.manage-player-name { font-size:14px; color:#d0e8ff; }
.remove-btn { background:none; border:1px solid #002d3d; color:#4488aa; font-size:11px; cursor:pointer; padding:8px 12px; border-radius:3px; font-family:'Share Tech Mono',monospace; letter-spacing:1px; -webkit-appearance:none; min-height:38px; min-width:95px; }
.remove-btn:active { border-color:#ff3355; color:#ff3355; }
.add-row { display:flex; gap:10px; margin-top:10px; }
.add-row input { flex:1; padding:13px 14px; background:#060c16; color:#d0e8ff; font-family:'Share Tech Mono',monospace; font-size:14px; border:1px solid #002d3d; border-radius:4px; outline:none; -webkit-appearance:none; }
.add-row input:focus { border-color:#ffd700; }
.add-row button { padding:13px 16px; background:#3a2d00; color:#ffd700; border:1px solid #ffd700; border-radius:4px; font-family:'Share Tech Mono',monospace; font-size:13px; cursor:pointer; -webkit-appearance:none; white-space:nowrap; }

/* PIN MODAL */
#pin-modal { position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:990; display:none; align-items:center; justify-content:center; }
#pin-modal.open { display:flex; }
#pin-box { background:#090e18; border:1px solid #ffd700; border-radius:8px; padding:28px 24px; width:290px; max-width:90vw; text-align:center; }
.pin-title { font-family:'Orbitron',sans-serif; font-size:13px; color:#ffd700; letter-spacing:3px; margin-bottom:6px; }
.pin-sub   { font-size:11px; color:#4488aa; margin-bottom:18px; letter-spacing:1px; }
#pin-input { width:100%; padding:14px; background:#060c16; color:#ffd700; font-family:'Orbitron',sans-serif; font-size:24px; letter-spacing:10px; text-align:center; border:1px solid #002d3d; border-radius:4px; outline:none; -webkit-appearance:none; margin-bottom:12px; }
#pin-input:focus { border-color:#ffd700; }
#pin-error { font-size:12px; color:#ff3355; min-height:18px; margin-bottom:12px; }
.pin-buttons { display:flex; gap:10px; }
.pin-cancel { flex:1; padding:13px; background:#0c1220; color:#4488aa; border:1px solid #002d3d; border-radius:4px; font-family:'Share Tech Mono',monospace; font-size:13px; cursor:pointer; -webkit-appearance:none; }
.pin-ok { flex:2; padding:13px; background:#ffd700; color:#02040a; border:none; border-radius:4px; font-family:'Orbitron',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; cursor:pointer; -webkit-appearance:none; }

/* TOAST */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#ffd700; color:#02040a; font-family:'Orbitron',monospace; font-size:12px; letter-spacing:2px; padding:12px 24px; border-radius:4px; opacity:0; pointer-events:none; transition:opacity .3s; z-index:999; white-space:nowrap; }
#toast.show  { opacity:1; }
#toast.error { background:#ff3355; color:#fff; }

.empty-state { text-align:center; padding:40px 16px; color:#6699bb; font-size:13px; letter-spacing:1px; line-height:2.5; }
.empty-icon  { font-size:40px; margin-bottom:10px; opacity:.5; }
::-webkit-scrollbar { width:2px; }
::-webkit-scrollbar-thumb { background:#002d3d; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- LOADING -->
<div id="loading">
  <h1>♠ POKER.OS</h1>
  <p id="load-sub">CONNESSIONE AL DATABASE...</p>
  <div class="spinner" id="load-spinner"></div>
  <div id="load-err"></div>
  <button id="load-retry" onclick="location.reload()">↺ RIPROVA</button>
</div>

<!-- PIN MODAL -->
<div id="pin-modal">
  <div id="pin-box">
    <div class="pin-title">♠ AREA ADMIN</div>
    <div class="pin-sub">INSERISCI IL PIN SEGRETO</div>
    <input id="pin-input" type="password" inputmode="numeric" maxlength="6" placeholder="••••">
    <div id="pin-error"></div>
    <div class="pin-buttons">
      <button class="pin-cancel" id="pin-cancel-btn">ANNULLA</button>
      <button class="pin-ok"     id="pin-ok-btn">◈ OK</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div id="topbar">
    <div id="logo">♠ POKER.OS <small>◈ TRACKER SETTIMANALE</small></div>
    <div id="sync-wrap">
      <div id="sync-dot"></div>
      <span id="sync-text" style="font-size:10px;color:#4488aa;margin-left:6px;letter-spacing:1px;">—</span>
    </div>
  </div>

  <div id="tabs">
    <div class="tab active" data-page="rank">🏆 RANK</div>
    <div class="tab" data-page="new">➕ PARTITA</div>
    <div class="tab" data-page="history">📋 STORICO</div>
    <div class="tab" data-page="players">👤 GIOC.</div>
  </div>

  <!-- CLASSIFICA -->
  <div class="page active" id="page-rank">
    <div class="card" style="padding:0;overflow:hidden;">
      <div style="padding:14px 16px 8px;"><div class="card-title">◈ CLASSIFICA GENERALE</div></div>
      <div id="rank-list"></div>
    </div>
  </div>

  <!-- NUOVA PARTITA -->
  <div class="page" id="page-new">
    <div id="form-container"></div>
  </div>

  <!-- STORICO -->
  <div class="page" id="page-history">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-size:11px;color:#4488aa;letter-spacing:2px;">◈ PARTITE REGISTRATE</span>
      <button class="btn-danger" id="reset-btn">⌫ RESET</button>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- GIOCATORI -->
  <div class="page" id="page-players">
    <div class="card">
      <div class="card-title">◈ GESTIONE GIOCATORI</div>
      <div id="manage-list"></div>
      <div class="add-row">
        <input id="new-player-input" type="text" placeholder="Nome giocatore..." maxlength="18">
        <button id="add-player-btn">+ AGGIUNGI</button>
      </div>
    </div>
    <div id="stats-list"></div>
  </div>

</div>

<div id="toast"></div>

<script>
'use strict';

/* ══════════════════════════════════════════════
   CONFIGURAZIONE
══════════════════════════════════════════════ */
const CONFIG = {
  maxPlayers:     9,
  connectTimeout: 12000,
  // Hash SHA-256 del PIN "1234"
  // Per cambiare PIN: vai su https://emn178.github.io/online-tools/sha256.html
  // digita il tuo PIN, copia l'hash e incollalo qui sotto
  pinHash: '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4'
};

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCj7OZPO0H5MJR-ac6S2hLRzQhezu6_hqA",
  authDomain:        "poker-os-f0789.firebaseapp.com",
  databaseURL:       "https://poker-os-f0789-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "poker-os-f0789",
  storageBucket:     "poker-os-f0789.firebasestorage.app",
  messagingSenderId: "1031295699512",
  appId:             "1:1031295699512:web:e391ff5b5c7c3dec4d74cd"
};

/* ══════════════════════════════════════════════
   STATO
══════════════════════════════════════════════ */
let database    = null;
let appData     = { players: [], sessions: [] };
let pinCallback = null;

const formState = {
  step:      1,
  date:      '',
  quota:     10,       // ← quota per partita, inserita dall'utente
  players:   [],
  reentries: {},
  podium:    ['', '', ''],
  prizes:    ['', '', '']
};

/* ══════════════════════════════════════════════
   UTILITÀ
══════════════════════════════════════════════ */
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(message, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = message;
  el.className = isError ? 'error show' : 'show';
  setTimeout(() => el.classList.remove('show'), 2400);
}

async function sha256(text) {
  const encoded = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', encoded);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

/* ══════════════════════════════════════════════
   LOADING & SYNC
══════════════════════════════════════════════ */
function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}
function showLoadError(msg) {
  document.getElementById('load-spinner').style.display = 'none';
  const el = document.getElementById('load-err');
  el.style.display = 'block';
  el.innerHTML = msg.replace(/\n/g,'<br>');
  document.getElementById('load-retry').style.display = 'block';
}
function setSyncStatus(status) {
  document.getElementById('sync-dot').className = status;
  document.getElementById('sync-text').textContent =
    status === 'online' ? 'ONLINE' : status === 'syncing' ? 'SYNC...' : 'OFFLINE';
}

/* ══════════════════════════════════════════════
   FIREBASE
══════════════════════════════════════════════ */
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  database = firebase.database();
  const timer = setTimeout(() =>
    showLoadError('Connessione assente o lenta.\nControlla internet e riprova.'), CONFIG.connectTimeout);

  database.ref('pokeros').on('value', snap => {
    clearTimeout(timer);
    const v = snap.val();
    appData.players  = (v && Array.isArray(v.players))  ? v.players  : [];
    appData.sessions = (v && Array.isArray(v.sessions)) ? v.sessions : [];
    hideLoading();
    setSyncStatus('online');
    renderAll();
    if (document.getElementById('page-new').classList.contains('active')) renderForm();
  }, err => {
    clearTimeout(timer);
    showLoadError('Errore connessione:\n' + err.message);
  });

  firebase.database().ref('.info/connected').on('value', snap => {
    if (document.getElementById('loading').style.display === 'none')
      setSyncStatus(snap.val() ? 'online' : 'offline');
  });
} catch(e) { showLoadError('Errore Firebase:\n' + e.message); }

function saveToFirebase() {
  if (!database) return;
  setSyncStatus('syncing');
  database.ref('pokeros')
    .set({ players: appData.players, sessions: appData.sessions })
    .then(() => setSyncStatus('online'))
    .catch(() => { setSyncStatus('offline'); showToast('ERRORE SALVATAGGIO', true); });
}

/* ══════════════════════════════════════════════
   PIN ADMIN
   FIX: salvo la callback PRIMA di chiudere il modal,
   così closePinModal() non la azzera prima di eseguirla.
══════════════════════════════════════════════ */
function openPinModal(callback) {
  pinCallback = callback;
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-modal').classList.add('open');
  setTimeout(() => document.getElementById('pin-input').focus(), 200);
}

function closePinModal() {
  document.getElementById('pin-modal').classList.remove('open');
  // NON azzerare pinCallback qui — viene azzerato dopo l'esecuzione in confirmPin()
}

async function confirmPin() {
  const entered = document.getElementById('pin-input').value;
  const hash    = await sha256(entered);
  if (hash === CONFIG.pinHash) {
    closePinModal();
    // FIX: salvo la callback in variabile locale PRIMA di azzerare pinCallback
    const cb = pinCallback;
    pinCallback = null;
    if (cb) cb();           // ← eseguo la callback salvata
  } else {
    document.getElementById('pin-error').textContent = '⚠ PIN ERRATO';
    document.getElementById('pin-input').value = '';
    setTimeout(() => document.getElementById('pin-error').textContent = '', 2000);
  }
}

document.getElementById('pin-cancel-btn').addEventListener('click', () => {
  closePinModal();
  pinCallback = null;
});
document.getElementById('pin-ok-btn').addEventListener('click', confirmPin);
document.getElementById('pin-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmPin();
});

// Reset storico
document.getElementById('reset-btn').addEventListener('click', () => {
  openPinModal(() => {
    if (confirm('Eliminare TUTTE le partite?\nI giocatori rimarranno.')) {
      appData.sessions = [];
      saveToFirebase();
      renderAll();
      showToast('STORICO ELIMINATO');
    }
  });
});

/* ══════════════════════════════════════════════
   STATISTICHE
══════════════════════════════════════════════ */
function getPlayerStats(playerName) {
  let wins=0, second=0, third=0, earned=0, spent=0, reentries=0, sessions=0;
  appData.sessions.forEach(session => {
    if (!(session.players || []).includes(playerName)) return;
    const quota = session.quota || 10;
    sessions++;
    spent    += (1 + (session.reentries[playerName] || 0)) * quota;
    reentries += session.reentries[playerName] || 0;
    const pod = session.podium || [];
    if      (pod[0] === playerName) { wins++;   earned += Number(session.prizes && session.prizes[0] || 0); }
    else if (pod[1] === playerName) { second++; earned += Number(session.prizes && session.prizes[1] || 0); }
    else if (pod[2] === playerName) { third++;  earned += Number(session.prizes && session.prizes[2] || 0); }
  });
  return { wins, second, third, earned, spent, net: earned - spent, reentries, sessions };
}

function getRankedPlayers() {
  const set = new Set(appData.players);
  appData.sessions.forEach(s => (s.players || []).forEach(p => set.add(p)));
  return [...set]
    .map(name => ({ name, ...getPlayerStats(name) }))
    .sort((a,b) => b.net - a.net || b.wins - a.wins);
}

function getPlayerTitle(stats) {
  if (stats.wins >= 5)     return '♠ SHARK';
  if (stats.wins >= 3)     return '♦ PRO';
  if (stats.wins >= 1)     return '♣ VINCITORE';
  if (stats.sessions >= 3) return '♥ VETERANO';
  return '◈ ROOKIE';
}

function renderRank() {
  const container = document.getElementById('rank-list');
  const ranked = getRankedPlayers();
  if (!ranked.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">♠</div>NESSUN GIOCATORE<br><span style="color:#aabbcc;font-size:12px;">Vai su "👤 GIOC." per aggiungerne</span></div>`;
    return;
  }
  container.innerHTML = ranked.map((player, i) => {
    const bc   = ['r1','r2','r3'][i] || 'rn';
    const icon = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : i+1;
    const mc   = player.net > 0 ? 'pos' : player.net < 0 ? 'neg' : 'zero';
    const sign = player.net > 0 ? '+' : '';
    return `<div class="rank-row">
      <div class="rank-badge ${bc}">${icon}</div>
      <div class="rank-info">
        <div class="rank-name">${escapeHtml(player.name)}</div>
        <div class="rank-sub">${player.wins}🥇 ${player.second}🥈 ${player.third}🥉 · ${player.sessions} partite · ${player.reentries} rientri</div>
      </div>
      <div class="rank-money ${mc}">${sign}€${Math.abs(player.net)}</div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════════
   RENDER STORICO
══════════════════════════════════════════════ */
function renderHistory() {
  const container = document.getElementById('history-list');
  if (!appData.sessions.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>NESSUNA PARTITA REGISTRATA</div>`;
    return;
  }

  container.innerHTML = [...appData.sessions].reverse().map((session, ri) => {
    const origIdx = appData.sessions.length - 1 - ri;
    const quota   = session.quota || 10;
    const pot     = session.players.length * quota + Object.values(session.reentries || {}).reduce((a,b) => a+b, 0) * quota;
    const totRe   = Object.values(session.reentries || {}).reduce((a,b) => a+b, 0);
    const reStr   = Object.entries(session.reentries || {}).filter(([,v]) => v>0).map(([n,v]) => `${n}×${v}`).join(' · ') || '—';
    const icons   = ['🥇','🥈','🥉'];

    const medalsHtml = (session.podium || []).filter(Boolean).map((name, pi) =>
      `<div class="medal m${pi+1}">${icons[pi]} ${escapeHtml(name)}${session.prizes&&session.prizes[pi]?' · €'+session.prizes[pi]:''}</div>`
    ).join('');

    const prizesHtml = (session.podium || []).filter(Boolean).map((name, pi) =>
      session.prizes && session.prizes[pi]
        ? `<div class="prize-row"><span style="color:#4488aa">${pi+1}° POSTO</span><span style="color:#d0e8ff">${escapeHtml(name)}</span><span style="color:#00ff88;font-family:'Orbitron',sans-serif;font-size:12px;">€${session.prizes[pi]}</span></div>`
        : ''
    ).join('');

    return `<div class="session-card">
      <div class="session-header" data-session-idx="${origIdx}">
        <div>
          <div class="session-date">${escapeHtml(session.date)}</div>
          <div class="session-meta">${session.players.length} giocatori · quota €${quota} · pot €${pot} · rientri: ${totRe}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="btn-danger delete-session-btn" data-idx="${origIdx}" style="padding:6px 10px;font-size:10px;">✕</button>
          <span class="tog-arrow" style="color:#4488aa;font-size:14px;">▼</span>
        </div>
      </div>
      <div class="session-body" id="session-body-${origIdx}">
        <div class="medals-row">${medalsHtml}</div>
        ${prizesHtml ? `<div style="margin-bottom:10px;">${prizesHtml}</div>` : ''}
        <div style="font-size:10px;color:#4488aa;margin-bottom:6px;">PARTECIPANTI</div>
        <div class="player-tags">${(session.players||[]).map(p=>`<div class="player-tag">${escapeHtml(p)}</div>`).join('')}</div>
        ${reStr!=='—'?`<div style="font-size:11px;color:#cc44ff;margin-top:6px;">🔄 ${reStr}</div>`:''}
      </div>
    </div>`;
  }).join('');

  container.querySelectorAll('.session-header').forEach(header => {
    header.addEventListener('click', () => {
      const idx   = header.dataset.sessionIdx;
      const body  = document.getElementById('session-body-' + idx);
      const arrow = header.querySelector('.tog-arrow');
      const isOpen = body.classList.toggle('open');
      arrow.textContent = isOpen ? '▲' : '▼';
    });
  });

  container.querySelectorAll('.delete-session-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx, 10);
      openPinModal(() => {
        appData.sessions.splice(idx, 1);
        saveToFirebase();
        renderAll();
        showToast('PARTITA ELIMINATA');
      });
    });
  });
}

function addPlayer() {
  const input = document.getElementById('new-player-input');
  const name  = input.value.trim();
  if (!name) { showToast('INSERISCI UN NOME', true); return; }
  if (appData.players.includes(name)) { showToast('GIÀ PRESENTE', true); return; }

/* ══════════════════════════════════════════════
   FORM NUOVA PARTITA
══════════════════════════════════════════════ */
function initForm() {
  formState.step      = 1;
  formState.date      = new Date().toLocaleDateString('it-IT');
  formState.quota     = 10;
  formState.players   = [];
  formState.reentries = {};
  formState.podium    = ['', '', ''];
  formState.prizes    = ['', '', ''];
}

function calcPot() {
  const totRe = Object.values(formState.reentries).reduce((a,b) => a+b, 0);
  return (formState.players.length + totRe) * formState.quota;
}

function renderForm() {
  const container = document.getElementById('form-container');
  if (!container) return;

  /* ── STEP 1: Data, Quota, Giocatori ── */
  if (formState.step === 1) {
    const playerCards = appData.players.map((player, index) => {
      const isSelected = formState.players.includes(player);
      return `<div class="player-card ${isSelected ? 'selected' : ''}" data-player-index="${index}">
        <div class="player-dot"></div>
        <div class="player-card-name">${escapeHtml(player)}</div>
      </div>`;
    }).join('');

    container.innerHTML = `<div class="card">
      <div class="step-header"><div class="step-num">1</div><div class="step-title">DATA, QUOTA E GIOCATORI</div></div>

      <label class="field-label">DATA PARTITA</label>
      <input class="field-input" id="form-date" type="text" value="${formState.date}"
             placeholder="gg/mm/aaaa" style="margin-bottom:14px;">

      <label class="field-label">QUOTA DI INGRESSO (€) — vale anche per i rientri</label>
      <input class="field-input gold" id="form-quota" type="number" inputmode="decimal"
             min="1" step="0.5" value="${formState.quota}"
             placeholder="es. 10" style="margin-bottom:14px;">

      <label class="field-label">GIOCATORI <span id="selected-count" style="color:#ffd700;">(${formState.players.length} selezionati)</span></label>
      ${appData.players.length
        ? `<div class="player-grid">${playerCards}</div>`
        : `<div style="font-size:13px;color:#ff3355;padding:12px 0;">⚠ Aggiungi prima i giocatori nella tab "👤 GIOC."</div>`
      }
      <div class="nav-row">
        <button class="btn-primary" id="form-next-1">AVANTI ▶</button>
      </div>
    </div>`;

    // Listener selezione giocatori
    container.querySelectorAll('.player-card').forEach(card => {
      card.addEventListener('click', () => {
        const playerIndex = parseInt(card.dataset.playerIndex, 10);
        const playerName  = appData.players[playerIndex];
        const selectedIdx = formState.players.indexOf(playerName);
        if (selectedIdx >= 0) {
          formState.players.splice(selectedIdx, 1);
          delete formState.reentries[playerName];
          card.classList.remove('selected');
          card.querySelector('.player-dot').style.background = '#002d3d';
        } else {
          if (formState.players.length >= CONFIG.maxPlayers) { showToast('MASSIMO ' + CONFIG.maxPlayers, true); return; }
          formState.players.push(playerName);
          formState.reentries[playerName] = 0;
          card.classList.add('selected');
          card.querySelector('.player-dot').style.background = '#ffd700';
        }
        const cnt = document.getElementById('selected-count');
        if (cnt) cnt.textContent = `(${formState.players.length} selezionati)`;
      });
    });

    document.getElementById('form-next-1').addEventListener('click', () => {
      const dateEl  = document.getElementById('form-date');
      const quotaEl = document.getElementById('form-quota');
      if (dateEl)  formState.date  = dateEl.value.trim() || formState.date;
      if (quotaEl) formState.quota = parseFloat(quotaEl.value) || 10;
      if (formState.quota <= 0)         { showToast('INSERISCI UNA QUOTA VALIDA', true); return; }
      if (formState.players.length < 2) { showToast('SELEZIONA ALMENO 2 GIOCATORI', true); return; }
      formState.step = 2;
      renderForm();
    });

  /* ── STEP 2: Rientri ── */
  } else if (formState.step === 2) {
    container.innerHTML = `<div class="card">
      <div class="step-header"><div class="step-num">2</div><div class="step-title">RIENTRI</div></div>
      <div class="info-bar">
        <span>GIOCATORI: <strong>${formState.players.length}</strong></span>
        <span>QUOTA: <strong>€${formState.quota}</strong></span>
        <span>POT: <strong id="pot-display">€${calcPot()}</strong></span>
      </div>
      ${formState.players.map(player => `
        <div class="re-player">
          <div class="re-player-name">${escapeHtml(player)}</div>
          <div class="re-controls">
            <button class="count-btn" data-player="${escapeHtml(player)}" data-delta="-1">−</button>
            <div class="count-val" id="re-count-${player.replace(/\W/g,'_')}">${formState.reentries[player]||0}</div>
            <button class="count-btn" data-player="${escapeHtml(player)}" data-delta="1">+</button>
          </div>
        </div>`).join('')}
      <div class="nav-row">
        <button class="btn-secondary" id="re-back">◀ INDIETRO</button>
        <button class="btn-primary"   id="re-next">AVANTI ▶</button>
      </div>
    </div>`;

    container.querySelectorAll('.count-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const playerName = btn.dataset.player;

          <select class="field-select podium-select" data-podium-index="${idx}" style="flex:1">${opts}</select>

            placeholder="€ vincita" min="0" step="0.01"
            data-prize-index="${idx}"
            style="width:120px;flex-shrink:0;"
            value="${formState.prizes[idx]||''}">
        </div>
      </div>`;
    };

    container.innerHTML = `<div class="card">
      <div class="step-header"><div class="step-num">3</div><div class="step-title">PODIO E PREMI</div></div>
      <div style="font-size:11px;color:#4488aa;margin-bottom:14px;">La vincita € è opzionale.</div>

      });
    });
    container.querySelectorAll('.prize-input').forEach(inp => {
      inp.addEventListener('input', () => {
        formState.prizes[parseInt(inp.dataset.prizeIndex, 10)] = inp.value ? parseFloat(inp.value) : '';
      });
    });
    document.getElementById('pod-back').addEventListener('click', () => { formState.step = 2; renderForm(); });
    document.getElementById('pod-next').addEventListener('click', () => {
      if (!formState.podium[0]) { showToast('SELEZIONA IL 1° POSTO', true); return; }
      formState.step = 4; renderForm();
    });

  /* ── STEP 4: Riepilogo ── */
  } else if (formState.step === 4) {
    const totRe  = Object.values(formState.reentries).reduce((a,b) => a+b, 0);
    const reStr  = Object.entries(formState.reentries).filter(([,v])=>v>0).map(([n,v])=>`${n} ×${v}`).join(', ') || 'Nessuno';
    const places = ['🥇 1°','🥈 2°','🥉 3°'];
    const podiumHtml = formState.podium.filter(Boolean).map((name, i) =>
      `<div class="prize-row">
        <span style="color:#4488aa">${places[i]}</span>
        <span style="color:#d0e8ff">${escapeHtml(name)}</span>
        <span style="color:#00ff88;font-family:'Orbitron',sans-serif;font-size:12px;">${formState.prizes[i]?'€'+formState.prizes[i]:''}</span>
      </div>`
    ).join('');

    container.innerHTML = `<div class="card">
      <div class="step-header"><div class="step-num">4</div><div class="step-title">RIEPILOGO</div></div>
      <div class="info-bar" style="margin-bottom:14px;">
        <span>📅 <strong>${formState.date}</strong></span>
        <span>👥 <strong>${formState.players.length}</strong></span>
        <span>💰 POT <strong>€${calcPot()}</strong></span>
      </div>
      <div style="background:#0c1220;border-radius:4px;padding:9px 12px;margin-bottom:14px;font-size:12px;">
        💳 QUOTA: <span style="color:#ffd700;font-family:'Orbitron',sans-serif;">€${formState.quota}</span>
        <span style="color:#4488aa;"> · vale anche per ogni rientro</span>
      </div>
      <div style="font-size:11px;color:#4488aa;margin-bottom:8px;">PARTECIPANTI</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;">
        ${formState.players.map(p=>`<div class="player-tag" style="color:#d0e8ff;">${escapeHtml(p)}</div>`).join('')}
      </div>
      <div style="font-size:11px;color:#4488aa;margin-bottom:6px;">RIENTRI (${totRe})</div>
      <div style="font-size:13px;color:#cc44ff;margin-bottom:14px;">🔄 ${reStr}</div>
      <div style="font-size:11px;color:#4488aa;margin-bottom:8px;">PODIO</div>
      <div style="margin-bottom:16px;">${podiumHtml}</div>
      <div class="nav-row">
        <button class="btn-secondary" id="save-back">◀ MODIFICA</button>
        <button class="btn-primary"   id="save-btn">♠ SALVA PARTITA</button>
      </div>
    </div>`;

    document.getElementById('save-back').addEventListener('click', () => { formState.step = 3; renderForm(); });
    document.getElementById('save-btn').addEventListener('click', saveSession);
  }
}

function saveSession() {
  appData.sessions.push({
    date:      formState.date,
    quota:     formState.quota,        // ← quota salvata per ogni partita
    players:   [...formState.players],
    reentries: { ...formState.reentries },
    podium:    formState.podium.map(v => v || null),
    prizes:    formState.prizes.map(v => v || null),
  });
  saveToFirebase();
  showToast('♠ PARTITA SALVATA!');
  initForm();
  document.querySelectorAll('.tab').forEach(t  => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-page="rank"]').classList.add('active');
  document.getElementById('page-rank').classList.add('active');
  renderAll();
}

/* ══════════════════════════════════════════════
   STELLE
══════════════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  const stars  = Array.from({length:60}, () => ({
    x: Math.random()*9999, y: Math.random()*9999,
    r: Math.random()*1.3+0.3,
    phase: Math.random()*Math.PI*2,
    speed: Math.random()*0.015+0.005
  }));
  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  (function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(star => {
      star.phase += star.speed;
      const a = 0.1 + 0.7*(0.5+0.5*Math.sin(star.phase));
      ctx.beginPath();
      ctx.arc(star.x%canvas.width, star.y%canvas.height, star.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${Math.round(a*120)},${Math.round(a*190)},255,${a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();

initForm();
</script>
